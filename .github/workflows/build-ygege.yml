name: Build ygege external repo image

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout external repo
        uses: actions/checkout@v4
        with:
          repository: Obijc/ygege
          ref: develop
          path: external

      - name: Get external repo commit
        id: sha
        run: |
          cd external
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Read last SHA
        id: lastsha
        run: |
          if [ -f .ygege_last_sha ]; then
            echo "last=$(cat .ygege_last_sha)" >> $GITHUB_OUTPUT
          else
            echo "last=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare SHAs
        id: compare
        run: |
          if [ "${{ steps.lastsha.outputs.last }}" = "${{ steps.sha.outputs.sha }}" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.compare.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.compare.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.compare.outputs.changed == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push multi-arch image
        if: steps.compare.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: external
          file: external/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/ygege:latest
            ghcr.io/${{ github.repository_owner }}/ygege:${{ steps.sha.outputs.sha }}

      - name: Update SHA file
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.sha.outputs.sha }}" > .ygege_last_sha
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .ygege_last_sha
          git commit -m "Update last SHA to ${{ steps.sha.outputs.sha }}"

          git pull --rebase
          git push
